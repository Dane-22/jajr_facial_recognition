<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#311b92"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bgGrad)"/>
  <circle cx="256" cy="256" r="190" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4" stroke-dasharray="8 8"/>
  <g filter="url(#shadow)">
    <!-- Scanner frame corners -->
    <path d="M 140 180 L 140 150 Q 140 140 150 140 L 180 140" fill="none" stroke="url(#accentGrad)" stroke-width="8" stroke-linecap="round"/>
    <path d="M 332 140 L 362 140 Q 372 140 372 150 L 372 180" fill="none" stroke="url(#accentGrad)" stroke-width="8" stroke-linecap="round"/>
    <path d="M 140 332 L 140 362 Q 140 372 150 372 L 180 372" fill="none" stroke="url(#accentGrad)" stroke-width="8" stroke-linecap="round"/>
    <path d="M 332 372 L 362 372 Q 372 372 372 362 L 372 332" fill="none" stroke="url(#accentGrad)" stroke-width="8" stroke-linecap="round"/>
    <!-- Face Silhouette / Shield Icon -->
    <path d="M 256 160 C 210 160 185 195 185 245 C 185 305 220 345 256 360 C 292 345 327 305 327 245 C 327 195 302 160 256 160 Z" fill="url(#shieldGrad)" opacity="0.9"/>
    <!-- Eye scan dots & verification check mark -->
    <circle cx="225" cy="235" r="10" fill="#ffffff"/>
    <circle cx="287" cy="235" r="10" fill="#ffffff"/>
    <path d="M 220 280 Q 256 310 292 280" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
    <!-- Checkmark badge -->
    <circle cx="355" cy="345" r="32" fill="#10b981"/>
    <path d="M 342 345 L 351 354 L 368 335" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
